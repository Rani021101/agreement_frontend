<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet"
      href="dashboard.css">

<style>

.profile-card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.profile-card h3{
    margin-bottom:15px;
}

.profile-row{
    margin-bottom:10px;
}

.report-btn{
    width:100%;
    margin:5px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
}

.logout-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#dc2626;
    color:white;
}
.activity-card{

    background:#fff;

    border-radius:12px;

    padding:12px;

    margin-bottom:10px;

    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.activity-top{

    display:flex;

    gap:12px;

    align-items:flex-start;
}

.activity-icon{

    font-size:24px;

    min-width:40px;
}

.activity-content{

    flex:1;
}

.activity-description{

    font-weight:600;

    margin-bottom:5px;
}

.activity-user{

    font-size:13px;

    color:#666;

    margin-bottom:3px;
}

.activity-time{

    font-size:12px;

    color:#999;
}



.modal{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,.5);

    justify-content:center;

    align-items:center;

    z-index:999;
}
.modal-content {

    background: white;

    width: 90%;

    max-width: 500px;

    max-height: 80vh;

    overflow-y: auto;

    border-radius: 16px;

    padding: 20px;

    box-shadow: 0 10px 30px rgba(0,0,0,.2);

    animation: modalShow .2s ease;
}

@keyframes modalShow {

    from {
        transform: scale(.95);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}
.modal-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:15px;

    padding-bottom:10px;

    border-bottom:1px solid #eee;
}

.modal-header h3{

    margin:0;
}

.close{

    font-size:28px;

    cursor:pointer;

    color:#666;
}

.profile-item{

    background:#f8fafc;

    padding:12px;

    border-radius:10px;

    margin-bottom:10px;
}

.profile-item strong{

    display:block;

    margin-bottom:5px;
}

@keyframes slideUp{

    from{
        transform:translateY(100%);
    }

    to{
        transform:translateY(0);
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}



.activity-card{

    background:#f8fafc;

    padding:12px;

    border-radius:12px;

    margin-bottom:10px;
}

.activity-top{

    display:flex;

    gap:12px;

    align-items:flex-start;
}

.activity-icon{

    font-size:22px;
}

.menu-item{

    background:white;

    margin:12px;

    padding:16px;

    border-radius:14px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:
        0 2px 8px rgba(0,0,0,.08);

    cursor:pointer;

    transition:.2s;
}

.menu-item:hover{

    transform:translateY(-2px);
}

.menu-item span:first-child{

    font-size:15px;

    font-weight:600;
}

.logout{

    color:#dc2626;
}

.export-btn{

    width:100%;

    padding:14px;

    margin-top:10px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:15px;

    font-weight:600;

    cursor:pointer;

    transition:.2s;
}

.export-btn:hover{

    opacity:.9;
}
</style>

</head>

<body>

<header class="header">

    <div>
        <h2>👤 Profile</h2>
    </div>

</header>

<main class="container">
<div class="profile-menu">

    <div class="menu-item"
         onclick="openUserModal()">

        <span>👤 User Information</span>
        <span>›</span>

    </div>

    <div class="menu-item"
         onclick="openStatsModal()">

        <span>📊 Statistics</span>
        <span>›</span>

    </div>

    <div class="menu-item"
         onclick="openRenewalModal()">

        <span>🔔 Upcoming Renewals</span>
        <span>›</span>

    </div>

    <div class="menu-item"
         onclick="openActivityModal()">

        <span>📋 Recent Activities</span>
        <span>›</span>

    </div>

    <div class="menu-item"
         onclick="openReportModal()">

        <span>📥 Export Reports</span>
        <span>›</span>

    </div>

    <div class="menu-item logout"
         onclick="logout()">

        <span>🚪 Logout</span>

    </div>

</div>
</main>

<nav class="bottom-nav">

        <a href="dashboard.html" id="nav-home">🏠</a>
        <a href="agreements.html" id="nav-agreements">📋</a>
        <!-- <a href="#" onclick="goToRenewals()"> 🔔 </a> -->
        <a href="profile.html" id="nav-profile"> 👤 </a>

    </nav>
<script src="config.js"></script>
<script src="profile.js"></script>

<div id="modal"
     class="modal">

    <div class="modal-content">

        <div class="modal-header">

            <h3 id="modalTitle"></h3>

            <span class="close"
                  onclick="closeModal()">

                ×

            </span>

        </div>

        <div id="modalBody"></div>

    </div>

</div>
</body>

</html>
